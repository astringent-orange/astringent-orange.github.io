<script>
document.addEventListener("DOMContentLoaded", function() {
  const dropdown = document.querySelector(".dropdown");
  const search = document.querySelector(".navbar-search");

  if (dropdown) {
    const menu = dropdown.querySelector(".dropdown-menu");
    const toggle = dropdown.querySelector(".dropdown-toggle");

    function closeMenu() {
      dropdown.classList.remove("is-open");
      toggle.setAttribute("aria-expanded", "false");
    }

    function openMenu() {
      dropdown.classList.add("is-open");
      toggle.setAttribute("aria-expanded", "true");
    }

    toggle.addEventListener("click", function(e) {
      e.preventDefault();
      e.stopPropagation();

      const opened = dropdown.classList.contains("is-open");
      if (opened) {
        closeMenu();
      } else {
        openMenu();
      }
    });

    document.addEventListener("click", function(e) {
      if (!dropdown.contains(e.target)) {
        closeMenu();
      }
    });

    menu.addEventListener("click", function(e) {
      e.stopPropagation();
    });

    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape") {
        closeMenu();
      }
    });
  }

  if (search) {
    const searchToggle = search.querySelector(".navbar-search-toggle");
    const searchForm = search.querySelector(".navbar-search-form");
    const searchInput = search.querySelector(".navbar-search-input");
    const searchResults = search.querySelector(".navbar-search-results");
    const searchState = search.querySelector(".navbar-search-state");
    const searchList = search.querySelector(".navbar-search-list");
    const searchIndexPath = "/search.json";
    const searchBasePath = "/";
    const searchPagePath = "/search/";
    let searchIndex = null;
    let searchIndexPromise = null;

    function escapeHTML(value) {
      return String(value).replace(/[&<>"']/g, function(char) {
        const entityMap = {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          "\"": "&quot;",
          "'": "&#39;"
        };
        return entityMap[char];
      });
    }

    function escapeRegExp(value) {
      return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function buildSnippet(item, keyword) {
      const source = item.excerpt || item.content || "";
      if (!source) return "";

      const normalizedKeyword = keyword.trim().toLowerCase();
      const sourceLower = source.toLowerCase();
      const matchIndex = normalizedKeyword ? sourceLower.indexOf(normalizedKeyword) : -1;
      const start = matchIndex >= 0 ? Math.max(0, matchIndex - 24) : 0;
      const snippet = source.slice(start, start + 88).trim();

      return start > 0 ? "..." + snippet : snippet;
    }

    function highlightText(text, keyword) {
      if (!keyword) return escapeHTML(text);
      const safeKeyword = escapeRegExp(keyword.trim());
      if (!safeKeyword) return escapeHTML(text);

      return escapeHTML(text).replace(new RegExp("(" + safeKeyword + ")", "ig"), "<mark>$1</mark>");
    }

    function setSearchState(message, type) {
      searchState.textContent = message;
      searchState.dataset.state = type || "idle";
      searchState.hidden = false;
    }

    function clearSearchResults() {
      searchList.innerHTML = "";
    }

    function showResultsPanel() {
      searchResults.hidden = false;
      search.classList.add("show-results");
    }

    function hideResultsPanel() {
      searchResults.hidden = true;
      search.classList.remove("show-results");
    }

    function ensureSearchIndex() {
      if (searchIndex) return Promise.resolve(searchIndex);
      if (searchIndexPromise) return searchIndexPromise;

      setSearchState("\u6b63\u5728\u52a0\u8f7d\u641c\u7d22\u7d22\u5f15...", "loading");
      showResultsPanel();

      searchIndexPromise = fetch(searchIndexPath)
        .then(function(response) {
            if (!response.ok) throw new Error("Failed to load search index");
            return response.json();
          })
        .then(function(data) {
          searchIndex = Array.isArray(data) ? data : [];
          return searchIndex;
        })
        .catch(function() {
          setSearchState("\u641c\u7d22\u7d22\u5f15\u52a0\u8f7d\u5931\u8d25", "error");
          return [];
        });

      return searchIndexPromise;
    }

    function renderSearchResults(items, keyword) {
      clearSearchResults();
      showResultsPanel();

      if (!keyword.trim()) {
        setSearchState("\u8f93\u5165\u5173\u952e\u8bcd\u5f00\u59cb\u641c\u7d22", "idle");
        return;
      }

      if (!items.length) {
        setSearchState("\u672a\u627e\u5230\u76f8\u5173\u6587\u7ae0", "empty");
        return;
      }

      searchState.hidden = true;
      const html = items.map(function(item) {
        const snippet = buildSnippet(item, keyword);
        const metaParts = []
          .concat(item.categories || [])
          .concat(item.tags || []);

        return [
          '<a class="navbar-search-result-item" href="' + searchBasePath + escapeHTML(item.path) + '">',
          '<span class="navbar-search-result-title">' + highlightText(item.title || "Untitled", keyword) + "</span>",
          snippet ? '<span class="navbar-search-result-snippet">' + highlightText(snippet, keyword) + "</span>" : "",
          metaParts.length ? '<span class="navbar-search-result-meta">' + escapeHTML(metaParts.slice(0, 3).join(" / ")) + "</span>" : "",
          "</a>"
        ].join("");
      }).join("");

      searchList.innerHTML = html;
    }

    function performSearch(keyword) {
      ensureSearchIndex().then(function(index) {
        const trimmedKeyword = keyword.trim();
        if (!trimmedKeyword) {
          renderSearchResults([], "");
          return;
        }

        const normalizedKeyword = trimmedKeyword.toLowerCase();
        const matchedItems = index.filter(function(item) {
          const haystack = [
            item.title,
            item.excerpt,
            item.content,
            (item.tags || []).join(" "),
            (item.categories || []).join(" ")
          ].join(" ").toLowerCase();

          return haystack.includes(normalizedKeyword);
        }).sort(function(a, b) {
          const aTitle = (a.title || "").toLowerCase().includes(normalizedKeyword) ? 1 : 0;
          const bTitle = (b.title || "").toLowerCase().includes(normalizedKeyword) ? 1 : 0;
          return bTitle - aTitle;
        }).slice(0, 6);

        renderSearchResults(matchedItems, trimmedKeyword);
      });
    }

    function navigateToSearchPage(keyword) {
      const trimmedKeyword = keyword.trim();
      const target = trimmedKeyword ? searchPagePath + "?q=" + encodeURIComponent(trimmedKeyword) : searchPagePath;
      window.location.href = target;
    }

    function closeSearch() {
      search.classList.remove("is-open");
      searchToggle.setAttribute("aria-expanded", "false");
      hideResultsPanel();
    }

    function openSearch() {
      search.classList.add("is-open");
      searchToggle.setAttribute("aria-expanded", "true");
      window.requestAnimationFrame(function() {
        searchInput.focus();
      });
    }

    searchToggle.addEventListener("click", function(e) {
      e.preventDefault();
      e.stopPropagation();

      if (search.classList.contains("is-open")) {
        closeSearch();
      } else {
        openSearch();
        if (searchInput.value.trim()) {
          performSearch(searchInput.value);
        }
      }
    });

    searchForm.addEventListener("click", function(e) {
      e.stopPropagation();
    });

    searchForm.addEventListener("submit", function(e) {
      e.preventDefault();
      navigateToSearchPage(searchInput.value);
    });

    searchInput.addEventListener("input", function() {
      if (!search.classList.contains("is-open")) {
        openSearch();
      }
      performSearch(searchInput.value);
    });

    document.addEventListener("click", function(e) {
      if (!search.contains(e.target)) {
        closeSearch();
      }
    });

    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape") {
        closeSearch();
      }
    });

    searchResults.addEventListener("click", function(e) {
      e.stopPropagation();
    });
  }
});
</script>

<script>
document.addEventListener("DOMContentLoaded", function() {
  const container = document.querySelector(".search-page-container");
  if (!container) return;

  const form = container.querySelector(".search-page-form");
  const input = container.querySelector(".search-page-input");
  const summaryText = container.querySelector(".search-page-summary-text");
  const results = container.querySelector(".search-page-results");
  const pagination = container.querySelector(".search-page-pagination");
  const searchIndexPath = "/search.json";
  const searchBasePath = "/";
  const params = new URLSearchParams(window.location.search);
  const pageSize = 10;
  let searchIndex = [];

  function escapeHTML(value) {
    return String(value).replace(/[&<>"']/g, function(char) {
      const entityMap = {
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      };
      return entityMap[char];
    });
  }

  function escapeRegExp(value) {
    return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  }

  function highlightText(text, keyword) {
    if (!keyword) return escapeHTML(text);
    const safeKeyword = escapeRegExp(keyword.trim());
    if (!safeKeyword) return escapeHTML(text);

    return escapeHTML(text).replace(new RegExp("(" + safeKeyword + ")", "ig"), "<mark>$1</mark>");
  }

  function buildSnippet(item, keyword) {
    const source = item.content || item.excerpt || "";
    if (!source) return "";

    const normalizedKeyword = keyword.trim().toLowerCase();
    const sourceLower = source.toLowerCase();
    const matchIndex = normalizedKeyword ? sourceLower.indexOf(normalizedKeyword) : -1;
    const start = matchIndex >= 0 ? Math.max(0, matchIndex - 42) : 0;
    const snippet = source.slice(start, start + 168).trim();

    return start > 0 ? "..." + snippet : snippet;
  }

  function formatDate(dateValue) {
    if (!dateValue) return "";
    const date = new Date(dateValue);
    if (Number.isNaN(date.getTime())) return "";
    return date.toISOString().slice(0, 10);
  }

  function buildWrapList(items, className, prefix) {
    if (!items.length) return "";

    return [
      '<ul class="wrap-list ' + className + '">',
      items.slice(0, 4).map(function(item) {
        return '<li><span>' + prefix + " " + escapeHTML(item) + "</span></li>";
      }).join(""),
      "</ul>"
    ].join("");
  }

  function renderEmptyState(message) {
    pagination.hidden = true;
    results.innerHTML = [
      '<div class="search-page-empty layout-margin content-padding--large soft-size--large soft-style--box">',
      "<p>" + escapeHTML(message) + "</p>",
      "</div>"
    ].join("");
  }

  function renderPagination(totalItems, currentPage, keyword) {
    const totalPages = Math.ceil(totalItems / pageSize);

    if (totalPages <= 1) {
      pagination.hidden = true;
      pagination.innerHTML = "";
      return;
    }

    const links = [];
    const addLink = function(label, pageNumber, className) {
      const url = "?q=" + encodeURIComponent(keyword) + "&page=" + pageNumber;
      const classes = className ? " " + className : "";
      links.push('<a class="' + classes.trim() + '" href="' + url + '" data-page="' + pageNumber + '">' + label + "</a>");
    };

    if (currentPage > 1) {
      addLink("\u4e0a\u4e00\u9875", currentPage - 1, "extend prev");
    }

    for (let pageNumber = 1; pageNumber <= totalPages; pageNumber++) {
      if (
        pageNumber === 1 ||
        pageNumber === totalPages ||
        Math.abs(pageNumber - currentPage) <= 1
      ) {
        if (pageNumber === currentPage) {
          links.push('<span class="page-number current">' + pageNumber + "</span>");
        } else {
          addLink(String(pageNumber), pageNumber, "page-number");
        }
      } else if (
        (pageNumber === 2 && currentPage > 3) ||
        (pageNumber === totalPages - 1 && currentPage < totalPages - 2)
      ) {
        links.push('<span class="space">...</span>');
      }
    }

    if (currentPage < totalPages) {
      addLink("\u4e0b\u4e00\u9875", currentPage + 1, "extend next");
    }

    pagination.hidden = false;
    pagination.innerHTML = links.join("");
  }

  function renderResults(items, keyword, currentPage) {
    if (!keyword.trim()) {
      summaryText.textContent = "\u8f93\u5165\u5173\u952e\u8bcd\u5f00\u59cb\u641c\u7d22\u3002";
      renderEmptyState("\u641c\u7d22\u7ed3\u679c\u5c06\u663e\u793a\u5728\u8fd9\u91cc\u3002");
      return;
    }

    summaryText.textContent = "\u5171\u627e\u5230 " + items.length + " \u7bc7\u76f8\u5173\u6587\u7ae0";

    if (!items.length) {
      renderEmptyState("\u672a\u627e\u5230\u5339\u914d\u7684\u6587\u7ae0\u3002");
      return;
    }

    const totalPages = Math.ceil(items.length / pageSize);
    const safePage = Math.min(Math.max(currentPage, 1), totalPages);
    const pageItems = items.slice((safePage - 1) * pageSize, safePage * pageSize);

    results.innerHTML = pageItems.map(function(item) {
      const dateText = formatDate(item.date);
      const snippet = buildSnippet(item, keyword);
      const hasCover = Boolean(item.cover);
      const wrapClass = hasCover ? "dark" : "light";
      const coverHTML = hasCover ? [
        '<div class="card-cover" style="background-image: url(' + escapeHTML(item.cover) + ')"></div>',
        '<a href="' + searchBasePath + escapeHTML(item.path) + '" class="card-cover-hitarea" aria-label="' + escapeHTML(item.title || "Untitled") + '"></a>'
      ].join("") : "";

      return [
        '<div class="article-item layout-padding">',
        '<article class="card-container article-card content-padding--large soft-size--large soft-style--box search-result-card" data-url="' + searchBasePath + escapeHTML(item.path) + '">',
        coverHTML,
        '<div class="card-text">',
        '<a href="' + searchBasePath + escapeHTML(item.path) + '" itemprop="url">',
        '<h2 class="card-text--title">' + highlightText(item.title || "Untitled", keyword) + '</h2>',
        "</a>",
        dateText ? '<div class="card-text--row"><span>\u53d1\u5e03\u4e8e </span><time>' + escapeHTML(dateText) + "</time></div>" : "",
        buildWrapList(item.categories || [], wrapClass, "\u5206\u7c7b"),
        buildWrapList(item.tags || [], wrapClass, "\u6807\u7b7e"),
        snippet ? '<p class="search-result-excerpt">' + highlightText(snippet, keyword) + "</p>" : "",
        "</div>",
        "</article>",
        "</div>"
      ].join("");
    }).join("");

    renderPagination(items.length, safePage, keyword);
  }

  function performSearch(keyword, pageNumber) {
    const trimmedKeyword = keyword.trim();
    const matchedItems = !trimmedKeyword ? [] : searchIndex.filter(function(item) {
      const haystack = [
        item.title,
        item.excerpt,
        item.content,
        (item.tags || []).join(" "),
        (item.categories || []).join(" ")
      ].join(" ").toLowerCase();

      return haystack.includes(trimmedKeyword.toLowerCase());
    }).sort(function(a, b) {
      const normalizedKeyword = trimmedKeyword.toLowerCase();
      const aTitle = (a.title || "").toLowerCase().includes(normalizedKeyword) ? 1 : 0;
      const bTitle = (b.title || "").toLowerCase().includes(normalizedKeyword) ? 1 : 0;
      return bTitle - aTitle;
    });

    renderResults(matchedItems, trimmedKeyword, pageNumber || 1);
  }

  form.addEventListener("submit", function(e) {
    e.preventDefault();
    const keyword = input.value.trim();
    const nextUrl = keyword ? "?q=" + encodeURIComponent(keyword) + "&page=1" : window.location.pathname;
    window.history.replaceState({}, "", nextUrl);
    performSearch(keyword, 1);
  });

  pagination.addEventListener("click", function(e) {
    const target = e.target.closest("[data-page]");
    if (!target) return;

    e.preventDefault();
    const keyword = input.value.trim();
    const nextPage = Number(target.dataset.page) || 1;
    const nextUrl = "?q=" + encodeURIComponent(keyword) + "&page=" + nextPage;
    window.history.replaceState({}, "", nextUrl);
    performSearch(keyword, nextPage);
    const top = container.getBoundingClientRect().top + window.scrollY - 24;
    window.scrollTo({ top: Math.max(top, 0), behavior: "smooth" });
  });

  fetch(searchIndexPath)
    .then(function(response) {
      if (!response.ok) throw new Error("Failed to load search index");
      return response.json();
    })
    .then(function(data) {
      searchIndex = Array.isArray(data) ? data : [];
      const initialKeyword = params.get("q") || "";
      const initialPage = Number(params.get("page") || "1") || 1;
      input.value = initialKeyword;
      performSearch(initialKeyword, initialPage);
    })
    .catch(function() {
      summaryText.textContent = "\u641c\u7d22\u7d22\u5f15\u52a0\u8f7d\u5931\u8d25\u3002";
      renderEmptyState("\u641c\u7d22\u7d22\u5f15\u52a0\u8f7d\u5931\u8d25\u3002");
    });
});
</script>
